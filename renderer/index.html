<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cache Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Custom title bar -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="title-icon">
        <circle cx="12" cy="12" r="3" fill="#4e9af1"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="#4e9af1" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Cache Viewer</span>
    </div>
    <div id="titlebar-controls">
      <button id="btn-minimize" title="Minimize">&#8212;</button>
      <button id="btn-maximize" title="Maximize">&#9633;</button>
      <button id="btn-close" title="Close">&#10005;</button>
    </div>
  </div>

  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <div class="total-label">Total Cache</div>
        <div id="total-size" class="total-size-value">—</div>
      </div>
      <nav id="group-nav">
        <div class="nav-loading">Scanning...</div>
      </nav>
    </aside>

    <!-- Main content -->
    <main id="content">
      <div id="welcome-screen">
        <div class="welcome-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#4e9af1" stroke-width="1.5"/>
            <path d="M12 7v5l3 3" stroke="#4e9af1" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h2>Scanning your cache...</h2>
        <p id="scan-status-text">Initializing</p>
        <div id="scan-progress-bar"><div id="scan-progress-fill"></div></div>
      </div>

      <div id="group-view" class="hidden">
        <div id="group-header">
          <div id="group-title-area">
            <div id="group-icon-large"></div>
            <div>
              <h1 id="group-title">Group</h1>
              <p id="group-desc"></p>
            </div>
          </div>
          <div id="group-stats">
            <div class="stat-card">
              <div class="stat-value" id="group-size-stat">—</div>
              <div class="stat-label">Total Size</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="group-count-stat">—</div>
              <div class="stat-label">Items</div>
            </div>
          </div>
        </div>

        <div id="subgroup-grid"></div>
      </div>

      <div id="files-view" class="hidden">
        <div id="files-header">
          <button id="btn-back" class="btn-secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Back
          </button>
          <div id="files-breadcrumb"></div>
          <div id="files-actions">
            <button id="btn-open-folder" class="btn-secondary" title="Open in Explorer">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" stroke="currentColor" stroke-width="1.5"/></svg>
              Open Folder
            </button>
            <button id="btn-delete-all" class="btn-danger hidden" title="Delete all files in this folder">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Delete All
            </button>
            <button id="btn-delete-selected" class="btn-danger hidden" title="Delete selected items">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Delete Selected
            </button>
          </div>
        </div>

        <div id="files-search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="files-search" type="text" placeholder="Filter files..." />
        </div>

        <div id="files-list-header">
          <div class="fl-check"><input type="checkbox" id="chk-select-all" title="Select all" /></div>
          <div class="fl-name">Name</div>
          <div class="fl-type">Type</div>
          <div class="fl-size">Size</div>
          <div class="fl-date">Modified</div>
        </div>
        <div id="files-list"></div>
        <div id="files-empty" class="hidden">No files found</div>
      </div>
    </main>
  </div>

  <div id="toast" class="hidden"></div>

  <!-- Confirmation modal -->
  <div id="confirm-modal" class="hidden">
    <div id="confirm-box">
      <div id="confirm-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 9v4M12 17h.01" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="#f87171" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <h3 id="confirm-title">Confirm Delete</h3>
      <p id="confirm-message">Are you sure you want to delete these items?</p>
      <div id="confirm-actions">
        <button id="confirm-cancel" class="btn-secondary">Cancel</button>
        <button id="confirm-ok" class="btn-danger">Delete Permanently</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
